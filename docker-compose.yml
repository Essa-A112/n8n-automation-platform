version: "3.8"

# ─────────────────────────────────────────────────────────────────────────────
# LOCAL DEVELOPMENT ONLY — not used by Render
# Run with:  docker compose up
# Access at: http://localhost:5678
# ─────────────────────────────────────────────────────────────────────────────

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: n8n
      POSTGRES_USER: n8n
      POSTGRES_PASSWORD: n8nlocalpassword
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 5s
      timeout: 5s
      retries: 10

  n8n:
    image: n8nio/n8n:1.91.3
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      # Database
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: n8n
      DB_POSTGRESDB_USER: n8n
      DB_POSTGRESDB_PASSWORD: n8nlocalpassword
      DB_POSTGRESDB_SSL: "false"
      # n8n core
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      N8N_HOST: localhost
      WEBHOOK_URL: http://localhost:5678
      N8N_ENCRYPTION_KEY: local-dev-key-change-this-in-production
      # Timezone
      GENERIC_TIMEZONE: Europe/London
      TZ: Europe/London
      # Misc
      N8N_DIAGNOSTICS_ENABLED: "false"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  n8n_data:
